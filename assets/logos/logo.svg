<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 140" width="100%" height="100%">
  <defs>
    <!-- Color Gradients for the logo -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#00B8D4" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#3F3D9E" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#6C63FF" />
    </linearGradient>

    <!-- Subtle background glow (transparent, blends with any background) -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.12" />
      <stop offset="50%" stop-color="#6C63FF" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0" />
    </radialGradient>

    <!-- Visual Effects Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- No background rect – completely transparent -->

  <!-- Center Background Glow behind Logomark (semi‑transparent, blends nicely) -->
  <circle cx="60" cy="60" r="100" fill="url(#centerGlow)" />

  <!-- LOGOMARK: Hexagonal "X" Lattice / Atomic Structure -->
  <g id="logomark">
    <!-- Outer Predictive Orbits (Atomic Lab Vibe) -->
    <ellipse cx="60" cy="60" rx="70" ry="25" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-dasharray="8 6" transform="rotate(-45 60 60)" opacity="0.5"/>
    <ellipse cx="60" cy="60" rx="70" ry="25" fill="none" stroke="url(#purpleGrad)" stroke-width="1.5" stroke-dasharray="8 6" transform="rotate(45 60 60)" opacity="0.5"/>
    <ellipse cx="60" cy="60" rx="25" ry="70" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="8 6" transform="rotate(0 60 60)" opacity="0.5"/>

    <!-- Core "X" Structural Lines -->
    <line x1="60" y1="10" x2="60" y2="110" stroke="url(#cyanGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="103.3" y1="35" x2="16.7" y2="85" stroke="url(#purpleGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="103.3" y1="85" x2="16.7" y2="35" stroke="url(#cyanGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Inner Hexagon Structure -->
    <polygon points="60,22.5 81.65,22.5 81.65,97.5 60,97.5 38.35,97.5 38.35,22.5" fill="url(#accentGrad)" fill-opacity="0.1" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="4 3"/>

    <!-- Extreme Nodes (Electron Cloud Hotspots) -->
    <circle cx="60" cy="10" r="5" fill="#00E5FF" filter="url(#glow)"/>
    <circle cx="103.3" cy="35" r="5" fill="#6C63FF" filter="url(#glow)"/>
    <circle cx="103.3" cy="85" r="5" fill="#00E5FF" filter="url(#glow)"/>
    <circle cx="60" cy="110" r="5" fill="#6C63FF" filter="url(#glow)"/>
    <circle cx="16.7" cy="85" r="5" fill="#00E5FF" filter="url(#glow)"/>
    <circle cx="16.7" cy="35" r="5" fill="#6C63FF" filter="url(#glow)"/>

    <!-- Central Quantum Node -->
    <circle cx="60" cy="60" r="18" fill="#00E5FF" filter="url(#glowStrong)" fill-opacity="0.8"/>
    <circle cx="60" cy="60" r="6" fill="#FFFFFF"/>
  </g>

  <!-- LOGOTYPE: anuXlab Text -->
  <g id="logotype" filter="url(#dropShadow)">
    <!-- "Anu" - Lightweight, modern -->
    <text x="140" y="75" font-family="'Montserrat', 'Inter', 'Segoe UI', sans-serif" font-size="44" font-weight="300" fill="#E0E0E0" letter-spacing="2">Anu</text>
    
    <!-- "X" - Bold, glowing centerpiece -->
    <text x="222" y="68" font-family="'Montserrat', 'Inter', 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#00E5FF" letter-spacing="-2" filter="url(#glow)">X</text>
    
    <!-- "Lab" - Clean, precise -->
    <text x="270" y="77" font-family="'Montserrat', 'Inter', 'Segoe UI', sans-serif" font-size="36" font-weight="500" fill="#E0E0E0" letter-spacing="1">Lab</text>
  </g>

  <!-- TAGLINE with proper gap between INNOVATION and RESEARCH -->
  <g id="tagline">
    <text x="140" y="108" font-family="'Montserrat', 'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#E0E0E0" letter-spacing="4.5">INNOVATION</text>
    
    <!-- Divider Element -->
    <circle cx="260" cy="103" r="3" fill="#00E5FF" filter="url(#glow)"/>
    
    <!-- RESEARCH text moved to create comfortable gap -->
    <text x="290" y="108" font-family="'Montserrat', 'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#E0E0E0" letter-spacing="4.5">RESEARCH</text>
  </g>
</svg>